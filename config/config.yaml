data:
  location: "Connaught Place, New Delhi, India"
  num_triage_zones: 12
  random_seed: 42
  output_path: "data/medswarm_data.pkl"

environment:
  max_battery: 3000.0        # meters — drone dies if it goes beyond this
  max_steps_per_episode: 100 # cut off long episodes
  reward:
    distance_penalty: -0.1   # per meter traveled (both agents)
    zone_stabilized: 100.0   # bonus for each zone reached
    battery_failure: -2000.0 # drone ran out of juice — big penalty
    mission_complete: 5000.0 # all 12 zones done — jackpot

training:
  total_timesteps: 300000
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  clip_range: 0.2
  n_envs: 4               # parallel envs for faster training
  model_save_path: "models/ppo_medswarm"
  log_path: "logs/"
  eval_freq: 10000         # evaluate every N steps
  eval_episodes: 20

dashboard:
  port: 8501
  data_path: "data/medswarm_data.pkl"
  model_path: "models/ppo_medswarm"
  log_path: "logs/PPO_1"