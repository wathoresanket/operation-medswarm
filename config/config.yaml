data:
  location: "Connaught Place, New Delhi, India"
  num_triage_zones: 12
  random_seed: 42
  output_path: "data/medswarm_data.pkl"

environment:
  max_battery: 5000.0        # increased battery for more exploration
  max_steps_per_episode: 200 # doubled steps to allow full zone exploration
  reward:
    # FIXED: Removed distance penalty (it rewards inaction)
    # Instead use per-step cost to encourage efficiency
    per_step_penalty: -0.5   # -0.5 per step pushes agent to complete quickly
    zone_stabilized: 300.0   # increased to 300 — PRIMARY reward signal
    battery_failure: -5000.0 # increased to -5000 — hard constraint
    mission_complete: 8000.0 # bonus for full completion (but zones are main reward)

training:
  total_timesteps: 300000  # full training
  learning_rate: 0.0005    # slightly higher learning rate
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95        # for better advantage estimation
  clip_range: 0.2
  ent_coef: 0.05          # INCREASED entropy bonus (was 0.01) → encourages exploration
  n_envs: 4               # parallel envs for faster training
  model_save_path: "models/ppo_medswarm"
  log_path: "logs/"
  eval_freq: 10000        # evaluate every N steps
  eval_episodes: 20
  # Note: Custom neural network architecture is set in trainer.py
  # Policy uses 3-layer MLP: [256, 256, 128] for better representation learning

dashboard:
  port: 8501
  data_path: "data/medswarm_data.pkl"
  model_path: "models/ppo_medswarm"
  log_path: "logs/PPO_1"