# =============================================================================
# Operation MedSwarm - Configuration File
# =============================================================================

# Geographic Data Settings
data:
  location: "Connaught Place, New Delhi, India"
  network_type: "drive"
  num_triage_zones: 12
  random_seed: 42
  output_path: "data/medswarm_data.pkl"

# Environment Parameters
environment:
  max_battery: 3000.0  # meters (3km flight range)
  reward:
    distance_penalty: -0.1      # per meter
    zone_stabilized: 100.0      # per zone
    battery_failure: -2000.0    # mission failure
    mission_complete: 5000.0    # all zones cleared

# Training Hyperparameters
training:
  algorithm: "PPO"
  total_timesteps: 300000
  learning_rate: 0.0003
  n_steps: 2048
  n_envs: 4
  eval_freq: 5000
  save_freq: 10000
  verbose: 1
  
# Model Paths
paths:
  logs: "logs/"
  models: "models/"
  best_model: "models/best_model"
  final_model: "models/medswarm_final"

# Dashboard Settings
dashboard:
  port: 8501
  theme: "dark"
  refresh_rate: 1.0  # seconds
